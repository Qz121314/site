name: Batch 10 Lockfile Sync

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: batch-10-lockfile-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    if: github.head_ref == 'agent/dependency-css-cleanup-batch-10'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出清理分支
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装当前锁文件依赖
        run: pnpm install --frozen-lockfile

      - name: 应用清理并重新生成锁文件
        run: |
          node scripts/apply-batch-10-cleanup.mjs
          pnpm install --lockfile-only --no-frozen-lockfile

      - name: 提交生成结果
        run: |
          if git diff --quiet; then
            echo "Lockfile already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml astro.config.mjs src/styles/public.css src/lib/db/public.ts
          git commit -m "remove unused React integration and legacy public CSS"
          git push origin HEAD:${GITHUB_HEAD_REF}
