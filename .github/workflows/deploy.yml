name: Validate and Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - docs/**
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md
      - docs/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 初始化诊断目录
        run: mkdir -p ci-logs

      - name: 安装依赖
        shell: bash
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile 2>&1 | tee ci-logs/install.log

      - name: 生成 Cloudflare 类型
        shell: bash
        run: |
          set -o pipefail
          pnpm cf-typegen 2>&1 | tee ci-logs/typegen.log

      - name: 类型检查
        shell: bash
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee ci-logs/check.log

      - name: 构建 Astro SSR
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee ci-logs/build.log

      - name: 保存失败诊断
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-diagnostics-${{ github.run_id }}
          path: ci-logs/
          retention-days: 1

      - name: 同步 README 技术基线
        if: github.event_name == 'pull_request' && success()
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const path = "README.md";
          let content = readFileSync(path, "utf8");
          content = content.replace(
            "> 当前状态：需求已经冻结，下一步进入项目脚手架、数据库迁移和功能开发。",
            "> 当前状态：第一阶段项目脚手架、D1 初始迁移、后台登录和自动部署流程已经实现；正在进入核心后台功能开发。",
          );
          content = content.replace("| TypeScript | 7.x | 类型系统 |", "| TypeScript | 6.0.3 | 类型系统；Astro 检查器兼容版本 |");
          writeFileSync(path, content);
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md already up to date"
            exit 0
          fi
          git commit -m "docs: update implementation and TypeScript baseline"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: 创建临时 Worker Secrets 文件
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          node --input-type=module <<'NODE'
          import { writeFileSync } from "node:fs";
          const required = ["ADMIN_PASSWORD", "SESSION_SECRET"];
          for (const name of required) {
            if (!process.env[name]) throw new Error(`Missing GitHub Secret: ${name}`);
          }
          writeFileSync(".secrets.production.json", JSON.stringify({
            ADMIN_PASSWORD: process.env.ADMIN_PASSWORD,
            SESSION_SECRET: process.env.SESSION_SECRET,
          }));
          NODE

      - name: 部署 Cloudflare Worker
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --secrets-file .secrets.production.json

      - name: 应用 D1 数据库迁移
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm db:migrate:remote

      - name: 清理临时 Secrets 文件
        if: always() && github.event_name != 'pull_request'
        run: rm -f .secrets.production.json
