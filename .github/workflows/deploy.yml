name: Validate and Deploy Cloudflare Worker

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 输出最近生产失败记录
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo '--- latest deployment status comment ---'
          gh api "repos/$GITHUB_REPOSITORY/issues/3/comments?per_page=100&page=2" --jq '.[-1].body'
          echo '--- end deployment status comment ---'
