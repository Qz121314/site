name: Validate and Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - docs/**
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md
      - docs/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: 安装依赖
        run: pnpm install --no-frozen-lockfile

      - name: 生成 Cloudflare 类型
        run: pnpm cf-typegen

      - name: 类型检查
        run: pnpm check

      - name: 构建 Astro SSR
        run: pnpm build

      - name: 创建临时 Worker Secrets 文件
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          node --input-type=module <<'NODE'
          import { writeFileSync } from "node:fs";
          const required = ["ADMIN_PASSWORD", "SESSION_SECRET"];
          for (const name of required) {
            if (!process.env[name]) throw new Error(`Missing GitHub Secret: ${name}`);
          }
          writeFileSync(".secrets.production.json", JSON.stringify({
            ADMIN_PASSWORD: process.env.ADMIN_PASSWORD,
            SESSION_SECRET: process.env.SESSION_SECRET,
          }));
          NODE

      - name: 部署 Cloudflare Worker
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --secrets-file .secrets.production.json

      - name: 应用 D1 数据库迁移
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm db:migrate:remote

      - name: 清理临时 Secrets 文件
        if: always() && github.event_name != 'pull_request'
        run: rm -f .secrets.production.json
