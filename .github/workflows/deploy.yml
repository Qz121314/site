name: Validate and Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - docs/**
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 初始化诊断目录
        run: mkdir -p ci-logs

      - name: 安装依赖
        shell: bash
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile 2>&1 | tee ci-logs/install.log

      - name: 生成 Cloudflare 类型
        shell: bash
        run: |
          set -o pipefail
          pnpm cf-typegen 2>&1 | tee ci-logs/typegen.log

      - name: 类型检查
        shell: bash
        run: |
          set -o pipefail
          pnpm check:astro 2>&1 | tee ci-logs/check.log

      - name: 自动化测试
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee ci-logs/test.log

      - name: 验证本地 D1 迁移
        shell: bash
        run: |
          set -o pipefail
          pnpm db:migrate:local 2>&1 | tee ci-logs/migrate-local.log

      - name: 验证池可用性约束
        shell: bash
        run: |
          set -o pipefail
          pnpm verify:pool-integrity 2>&1 | tee ci-logs/pool-integrity.log

      - name: 构建 Astro SSR
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee ci-logs/build.log

      - name: 验证 Cloudflare 资源绑定
        shell: bash
        run: |
          set -o pipefail
          pnpm verify:deploy-config 2>&1 | tee ci-logs/deploy-config.log

      - name: 验证生产部署凭据
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          set -o pipefail
          node --input-type=module <<'NODE'
          const required = [
            "CLOUDFLARE_API_TOKEN",
            "CLOUDFLARE_ACCOUNT_ID",
            "ADMIN_PASSWORD",
            "SESSION_SECRET",
          ];
          for (const name of required) {
            if (!process.env[name]) throw new Error(`Missing GitHub Secret: ${name}`);
          }
          NODE
          pnpm exec wrangler whoami 2>&1 | tee ci-logs/cloudflare-auth.log

      - name: 创建临时 Worker Secrets 文件
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          node --input-type=module <<'NODE'
          import { writeFileSync } from "node:fs";
          writeFileSync(".secrets.production.json", JSON.stringify({
            ADMIN_PASSWORD: process.env.ADMIN_PASSWORD,
            SESSION_SECRET: process.env.SESSION_SECRET,
          }));
          NODE

      - name: 记录迁移前 D1 恢复书签
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          pnpm exec wrangler d1 time-travel info DB --json 2>&1 | tee ci-logs/d1-pre-migration-bookmark.json

      - name: 应用 D1 数据库迁移
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          pnpm db:migrate:remote 2>&1 | tee ci-logs/migrate.log

      - name: 部署 Cloudflare Worker
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          pnpm exec wrangler deploy --secrets-file .secrets.production.json 2>&1 | tee ci-logs/deploy.log

      - name: 清理临时 Secrets 文件
        if: always() && github.event_name != 'pull_request'
        run: rm -f .secrets.production.json

      - name: 保存失败诊断
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-diagnostics-${{ github.run_id }}
          path: ci-logs/
          retention-days: 1

      - name: 记录正式部署成功
        if: success() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS_ISSUE: "3"
        run: |
          gh issue reopen "$STATUS_ISSUE" --repo "$GITHUB_REPOSITORY" || true
          gh issue comment "$STATUS_ISSUE" --repo "$GITHUB_REPOSITORY" --body-file - <<EOF
          ✅ Cloudflare 正式部署成功。

          - Commit: \`$GITHUB_SHA\`
          - Actions: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          EOF
          gh issue close "$STATUS_ISSUE" --repo "$GITHUB_REPOSITORY" --reason completed

      - name: 记录正式部署失败
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS_ISSUE: "3"
        run: |
          gh issue reopen "$STATUS_ISSUE" --repo "$GITHUB_REPOSITORY" || true
          gh issue comment "$STATUS_ISSUE" --repo "$GITHUB_REPOSITORY" --body-file - <<EOF
          ❌ Cloudflare 正式部署失败。

          - Commit: \`$GITHUB_SHA\`
          - Actions: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID

          请检查失败步骤和 CI 诊断附件。
          EOF
