name: Batch 26 Admin Overlay Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/admin-overlay-audit-batch-26'
    runs-on: ubuntu-latest
    steps:
      - name: 检出后台浮层审计分支
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 应用后台浮层与残留代码清理
        run: node scripts/apply-admin-overlay-audit.mjs

      - name: 提交清理结果
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "Finish admin overlay and navigation cleanup"
          git push origin HEAD:${{ github.head_ref }}
