name: Agent Full Repository Audit

on:
  push:
    branches:
      - agent/full-functional-audit-batch-28
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate audit bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-output/logs

          {
            echo '# Repository files'
            find src tests migrations scripts .github -type f | sort
            echo
            echo '# Astro routes'
            find src/pages -type f | sort
            echo
            echo '# TODO/FIXME/HACK/deprecated/legacy markers'
            grep -RInE 'TODO|FIXME|HACK|deprecated|legacy|obsolete' src tests migrations scripts .github || true
            echo
            echo '# Known stale route and removed UI markers'
            grep -RInE '/products/new|product-entry-header|product-content-form-actions|allFilterLabel|contact-reveal|featured' src tests migrations scripts .github || true
            echo
            echo '# Conversion implementation references'
            grep -RInE 'conversion|randomIndex|crypto\.getRandomValues|conversion_group|conversion_resources' src tests migrations scripts || true
            echo
            echo '# Ad pool implementation references'
            grep -RInE 'ad_pool|advertisement|hero_ad|isBound|bind' src tests migrations scripts || true
            echo
            echo '# Possible page-level horizontal overflow rules'
            grep -RInE 'min-width:[[:space:]]*[0-9]+(rem|px)|overflow-x:[[:space:]]*(auto|scroll)|width:[[:space:]]*[0-9]+(rem|px)' src/styles src/components src/pages || true
            echo
            echo '# TypeScript and Astro imports'
            grep -RInE '^(import|export).*from' src tests scripts || true
          } > audit-output/audit-report.txt

          pnpm cf-typegen > audit-output/logs/typegen.log 2>&1
          pnpm check:astro > audit-output/logs/check.log 2>&1
          pnpm test > audit-output/logs/test.log 2>&1
          pnpm db:migrate:local > audit-output/logs/migrate.log 2>&1
          pnpm build > audit-output/logs/build.log 2>&1
          pnpm verify:deploy-config > audit-output/logs/deploy-config.log 2>&1

          tar -czf audit-output/repository-source.tar.gz \
            src tests migrations scripts .github package.json pnpm-lock.yaml astro.config.mjs tsconfig.json wrangler.jsonc

      - name: Upload audit artifact
        uses: actions/upload-artifact@v6
        with:
          name: full-repository-audit-${{ github.run_id }}
          path: audit-output/
          retention-days: 1
