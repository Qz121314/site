name: Agent Apply Full Audit Patch

on:
  push:
    branches:
      - agent/full-functional-audit-batch-28

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: agent/full-functional-audit-batch-28
          fetch-depth: 0

      - name: Decode and apply audited changes
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/.agent-audit-patch-{1,2,3,4,5} > /tmp/audit.patch.gz.b64
          base64 --decode /tmp/audit.patch.gz.b64 | gzip --decompress > /tmp/audit.patch

          if git apply --reverse --check /tmp/audit.patch >/dev/null 2>&1; then
            echo "Audit patch is already applied."
            exit 0
          fi

          git apply --check /tmp/audit.patch
          git apply /tmp/audit.patch
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden current workflows and remove residual code"
          git push origin HEAD:agent/full-functional-audit-batch-28
