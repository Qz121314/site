name: Batch 21 Admin Layout

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-layout:
    if: github.head_ref == 'agent/admin-density-pagination-batch-21'
    runs-on: ubuntu-latest
    steps:
      - name: 检出布局分支
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 应用后台排版优化
        run: node scripts/batch-21-layout.mjs

      - name: 提交布局结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Refine admin density and pagination"
          git push origin HEAD:${{ github.head_ref }}
